<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --uis-gara: #b30000; /* Merah Tua Karo */
      --gold: #d4af37;
      --black: #1a1a1a;
    }
    body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; }
    .header { background: var(--uis-gara); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--gold); border-radius: 8px 8px 0 0; }
    .form-container { background: white; padding: 20px; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .section-title { background: var(--black); color: var(--gold); padding: 5px 10px; margin-top: 20px; font-size: 0.9em; }
    label { display: block; margin-top: 10px; font-weight: bold; color: #333; }
    input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    .btn-simpan { background: var(--uis-gara); color: white; border: none; padding: 15px; width: 100%; margin-top: 30px; border-radius: 4px; font-weight: bold; cursor: pointer; border: 2px solid var(--gold); }
    .anak-row { display: flex; gap: 5px; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div class="header">
    <h2>TUTUR KARO</h2>
    <small>Rakut Sitelu, Tutur Siwaluh</small>
  </div>

  <div class="form-container">
    <form id="tuturForm" onsubmit="handleFormSubmit(this)">
      <label>Gelar / Nama Lengkap</label>
      <input type="text" name="nama" required>

      <label>Marga / Beru</label>
      <select name="marga">
        <option>Karo-Karo</option>
        <option>Ginting</option>
        <option>Tarigan</option>
        <option>Sembiring</option>
        <option>Perangin-angin</option>
      </select>

      <div class="section-title">INFO ORANG TUA (Bapa & Nande)</div>
      <input type="text" name="bapa" placeholder="Bapa (Lengkap dengan Marga)">
      <input type="text" name="nande" placeholder="Nande (Lengkap dengan Beru)">
      <input type="text" name="senina_turang" placeholder="Senina / Turang">

      <div class="section-title">INFO JABU (Istri/Suami & Mertua)</div>
      <input type="text" name="ndehara" placeholder="Ndehara / Perbulangen (Beru/Marga)">
      <input type="text" name="bapa_ndehara" placeholder="Simatua Amani (Marga)">
      <input type="text" name="nande_ndehara" placeholder="Simatua Inani (Beru)">
      <input type="text" name="senina_turang_ndehara" placeholder="Impal/Senina Ndehara">

      <div class="section-title">PUPUS (Anak)</div>
      <div id="anakContainer">
        <input type="text" name="anak[]" placeholder="Nama Anak 1 (Marga/Beru)">
      </div>
      <button type="button" onclick="addAnak()" style="margin-top:5px; background:#eee; border:1px solid #ccc;">+ Tambah Anak</button>

      <div class="section-title">KONTAK</div>
      <textarea name="alamat" placeholder="Alamat Lengkap"></textarea>
      <input type="tel" name="wa" placeholder="No. WA (0812...)">

      <button type="submit" class="btn-simpan">SIMPAN DATA</button>
    </form>
  </div>

  <script>
    function addAnak() {
      const container = document.getElementById('anakContainer');
      const input = document.createElement('input');
      input.type = 'text';
      input.name = 'anak[]';
      input.placeholder = 'Nama Anak Berikutnya';
      input.style.marginTop = '5px';
      container.appendChild(input);
    }

    function handleFormSubmit(formObject) {
      google.script.run.withSuccessHandler(msg => {
        alert(msg);
        formObject.reset();
      }).processForm(formObject);
    }
  </script>
</body>
</html>
